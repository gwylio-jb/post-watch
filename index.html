    <title>Post_Watch — by gwylio</title>

    <!-- Adobe Fonts: Azo Sans (headings) + Ingra (body) -->
    <link rel="stylesheet" href="https://use.typekit.net/ngv5ugr.css" />

    <!-- Google Fonts fallbacks: Archivo Black ≈ Azo Sans Black, Plus Jakarta Sans ≈ Ingra, JetBrains Mono -->

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <script>
      // Prevent flash: apply theme class before render. Light is the default.
      const t = localStorage.getItem('clause-control:theme');
      if (t === '"dark"') document.documentElement.classList.add('dark');
    </script>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
