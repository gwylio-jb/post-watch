<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Post_Watch — by gwylio</title>

    <!-- Fonts: Plus Jakarta Sans (full family — body 400/500, semibold 600,
         display 700/800), JetBrains Mono (kickers + code). One family across
         body and display for a cohesive type system; Archivo Black was
         dropped because its single 900-only weight read as too chunky for
         everyday section titles. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <script>
      // Prevent flash: apply theme class before render.
      // - `.dark`           — Tailwind `dark:` modifiers (untouched modules)
      // - `.theme-light` / `.theme-dark` — redesign tokens in src/styles/redesign.css
      // Default is dark (Sprint 1 V2.1 default — see App.tsx useLocalStorage).
      const t = localStorage.getItem('clause-control:theme');
      const isDark = t !== '"light"'; // anything other than explicit light = dark
      const cl = document.documentElement.classList;
      if (isDark) { cl.add('dark'); cl.add('theme-dark'); }
      else        { cl.add('theme-light'); }
    </script>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
