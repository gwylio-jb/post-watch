<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Post_Watch — by gwylio</title>

    <!-- Fonts: Archivo Black (display), Plus Jakarta Sans (body — 400/500/600/700
         weights for proper hierarchy), JetBrains Mono (kickers + code).
         Adobe Typekit was here previously with a placeholder kit ID that
         silently 404'd; removed in Sprint 9 to drop the wasted request. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <script>
      // Prevent flash: apply theme class before render. Light is the default.
      const t = localStorage.getItem('clause-control:theme');
      if (t === '"dark"') document.documentElement.classList.add('dark');
    </script>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
